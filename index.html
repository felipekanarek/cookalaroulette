<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cook à la Roulette</title>
  <meta name="description" content="O universo decide o que você vai cozinhar hoje.">

  <!-- Compartilhamento social (Open Graph / Twitter Card) — estático, não depende de JS -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Cook à la Roulette">
  <meta property="og:description" content="O universo decide o que você vai cozinhar hoje.">
  <meta property="og:url" content="https://felipekanarek.github.io/cookalaroulette/">
  <meta property="og:image" content="https://felipekanarek.github.io/cookalaroulette/assets/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Cook à la Roulette">
  <meta name="twitter:description" content="O universo decide o que você vai cozinhar hoje.">
  <meta name="twitter:image" content="https://felipekanarek.github.io/cookalaroulette/assets/og-image.png">

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <!-- a fonte é escolhida aleatoriamente do Google Fonts e injetada por app.js a cada visita -->
</head>
<body>
  <button id="roleta" class="roleta" type="button"
          aria-label="Sortear uma receita aleatória — Cook à la Roulette">
    <span class="linha">COOK</span>
    <span class="linha">À LA</span>
    <span class="linha">ROULETTE</span>
  </button>

  <p id="status" class="status" role="status" aria-live="polite"></p>

  <script src="sorteio.js"></script>
  <script src="app.js"></script>
</body>
</html>
